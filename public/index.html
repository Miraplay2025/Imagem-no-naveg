<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Flow Ultra Pro</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .mobile-field { background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; transition: all 0.3s; }
        .mobile-field:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        
        /* Log Box Estilizada */
        .log-box { 
            font-size: 11px; 
            max-height: 200px; 
            overflow-y: auto; 
            background: #000; 
            padding: 12px; 
            border-radius: 12px; 
            border: 1px solid #334155;
            font-family: 'Fira Code', monospace;
        }
        .log-entry { margin-bottom: 4px; border-left: 3px solid #475569; padding-left: 8px; }
        .log-success { border-color: #10b981; color: #34d399; }
        .log-error { border-color: #ef4444; color: #f87171; background: rgba(239, 68, 68, 0.1); }
        .log-warning { border-color: #f59e0b; color: #fbbf24; }
        .log-info { border-color: #3b82f6; color: #60a5fa; }

        .screenshot-box { 
            border: 2px solid #3b82f6; 
            border-radius: 16px; 
            overflow: hidden; 
            background: #000;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
        }
        
        .asset-preview { width: 100%; height: 70px; object-fit: cover; border-radius: 8px; }
        .asset-item { position: relative; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .remove-btn { 
            position: absolute; top: -6px; right: -6px; 
            background: #ef4444; color: white; border-radius: 50%; 
            width: 20px; height: 20px; font-size: 12px; 
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 2px solid #0f172a; font-weight: bold;
            z-index: 10;
        }
        
        .btn-main { transition: transform 0.1s; }
        .btn-main:active { transform: scale(0.98); }
    </style>
</head>
<body class="p-4 flex flex-col items-center pb-20">
    <div class="w-full max-w-md space-y-5">
        <header class="text-center space-y-1">
            <h1 class="text-2xl font-black tracking-tighter text-blue-500">FLOW AUTOMATOR</h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">V3.0 High Performance</p>
        </header>

        <div id="robot-view" class="hidden space-y-2">
            <div class="flex justify-between items-center px-1">
                <h2 id="view-title" class="text-[10px] font-bold text-blue-400 uppercase">Live Preview</h2>
                <span class="flex h-2 w-2 rounded-full bg-red-500 animate-pulse"></span>
            </div>
            <div class="screenshot-box">
                <img id="screen-img" class="w-full">
            </div>
        </div>

        <input id="flow-url" type="text" placeholder="https://flow.com/seu-link" class="w-full p-4 mobile-field outline-none text-sm font-medium">
        
        <div class="grid grid-cols-2 gap-3">
            <label class="block p-4 text-center mobile-field cursor-pointer text-[11px] bg-slate-900/50 border-dashed border-2 border-slate-700 hover:border-blue-500">
                <span class="block text-lg mb-1">🔑</span> Cookies JSON
                <input type="file" id="cookies-file" class="hidden" accept=".json">
                <div id="cookie-info" class="hidden mt-1 text-green-400 font-bold font-mono">✓ LOADED</div>
            </label>

            <label class="block p-4 text-center mobile-field cursor-pointer text-[11px] bg-slate-900/50 border-dashed border-2 border-slate-700 hover:border-blue-500">
                <span class="block text-lg mb-1">🖼️</span> Referências
                <input type="file" id="assets-file" class="hidden" multiple accept="image/*">
                <div id="assets-count" class="hidden mt-1 text-blue-400 font-bold">0 arquivos</div>
            </label>
        </div>

        <div id="assets-preview-container" class="grid grid-cols-3 gap-2 hidden bg-slate-900/80 p-3 rounded-xl border border-slate-800"></div>

        <div class="relative">
            <textarea id="prompt-input" class="w-full p-4 mobile-field h-48 outline-none text-sm resize-none" placeholder="Prompt 1...&#10;Prompt 2..."></textarea>
            <div class="absolute bottom-2 right-2 text-[10px] text-slate-500 font-mono" id="prompt-stats">0 Prompts Detectados</div>
        </div>
        
        <button id="btn-start" class="btn-main w-full p-4 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-black text-lg shadow-lg shadow-blue-900/20">INICIAR ROBÔ</button>
        <button id="btn-stop" class="hidden btn-main w-full p-4 bg-red-600 hover:bg-red-500 text-white rounded-2xl font-black text-lg">PARAR TUDO</button>

        <div id="confirm-box" class="hidden p-5 bg-green-950/40 border-2 border-green-500/50 rounded-2xl text-center space-y-4 backdrop-blur-sm">
            <div class="space-y-1">
                <p class="text-green-400 font-black text-sm uppercase">Página Pronta!</p>
                <p class="text-[11px] text-slate-300">O robô carregou os cookies e o Flow. Deseja iniciar o envio dos prompts?</p>
            </div>
            <button id="btn-confirm" class="w-full p-4 bg-green-500 hover:bg-green-400 text-black font-black rounded-xl shadow-xl">INICIAR AGORA</button>
        </div>

        <div class="space-y-2">
            <p class="text-[10px] font-bold text-slate-500 uppercase px-1">Console de Operação</p>
            <div id="logs" class="log-box"></div>
        </div>

        <div id="results" class="space-y-4"></div>
    </div>

    <script>
        const socket = io();
        let cookiesBase64 = null;
        let referenceAssets = [];
        const state = { prompts: [] };

        // --- Logica de Arquivos ---
        document.getElementById('cookies-file').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                cookiesBase64 = btoa(unescape(encodeURIComponent(ev.target.result.trim())));
                document.getElementById('cookie-info').classList.remove('hidden');
                addLog("Cookies carregados localmente.", "info");
            };
            reader.readAsText(file);
        };

        document.getElementById('assets-file').onchange = async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const id = Math.random().toString(36).substr(2, 9);
                    referenceAssets.push({
                        id: id,
                        name: file.name,
                        nameNoExt: file.name.replace(/\.[^/.]+$/, ""),
                        data: ev.target.result
                    });
                    renderAssets();
                };
                reader.readAsDataURL(file);
            }
            e.target.value = '';
        };

        function renderAssets() {
            const container = document.getElementById('assets-preview-container');
            const countLabel = document.getElementById('assets-count');
            container.innerHTML = '';
            
            if (referenceAssets.length > 0) {
                container.classList.remove('hidden');
                countLabel.classList.remove('hidden');
                countLabel.textContent = `${referenceAssets.length} arquivos`;
                referenceAssets.forEach(asset => {
                    const div = document.createElement('div');
                    div.className = "asset-item";
                    div.innerHTML = `
                        <div class="remove-btn" onclick="removeAsset('${asset.id}')">×</div>
                        <img src="${asset.data}" class="asset-preview border border-slate-700">
                    `;
                    container.appendChild(div);
                });
            } else {
                container.classList.add('hidden');
                countLabel.classList.add('hidden');
            }
        }

        window.removeAsset = (id) => {
            referenceAssets = referenceAssets.filter(a => a.id !== id);
            renderAssets();
        };

        // --- Logica de Prompts ---
        document.getElementById('prompt-input').oninput = (e) => {
            const raw = e.target.value.split(/\bPrompt\b/i).slice(1);
            state.prompts = raw.map(t => t.replace(/^[\s\d:.-]+/, "").trim()).filter(Boolean);
            document.getElementById('prompt-stats').textContent = `${state.prompts.length} Prompts Detectados`;
        };

        // --- Socket & Operações ---
        document.getElementById('btn-start').onclick = () => {
            if (state.prompts.length === 0) return alert("Adicione prompts!");
            
            addLog("Iniciando processo no servidor...", "info");
            socket.emit('start-automation', {
                link: document.getElementById('flow-url').value,
                prompts: state.prompts,
                cookiesBase64: cookiesBase64,
                assets: referenceAssets 
            });
            document.getElementById('btn-start').classList.add('hidden');
            document.getElementById('btn-stop').classList.remove('hidden');
        };

        socket.on('screenshot-update', (data) => {
            document.getElementById('robot-view').classList.remove('hidden');
            document.getElementById('screen-img').src = data.img;
            document.getElementById('view-title').textContent = data.title;
        });

        socket.on('automation-status', (data) => {
            if (data.showConfirm) document.getElementById('confirm-box').classList.remove('hidden');
        });

        document.getElementById('btn-confirm').onclick = () => {
            socket.emit('confirm-start');
            document.getElementById('confirm-box').classList.add('hidden');
            addLog("Loop de prompts confirmado e iniciado.", "success");
        };

        socket.on('log', (msg) => {
            let type = "info";
            if (msg.toLowerCase().includes("erro") || msg.toLowerCase().includes("falha")) type = "error";
            if (msg.toLowerCase().includes("ok") || msg.toLowerCase().includes("sucesso") || msg.toLowerCase().includes("fim")) type = "success";
            if (msg.toLowerCase().includes("aguardando") || msg.toLowerCase().includes("aviso")) type = "warning";
            addLog(msg, type);
        });

        function addLog(msg, type) {
            const logBox = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const time = new Date().toLocaleTimeString('pt-BR', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            entry.innerHTML = `<span class="opacity-40 text-[9px] mr-2">${time}</span> ${msg}`;
            logBox.prepend(entry);
        }

        socket.on('new-images', (data) => {
            const div = document.createElement('div');
            div.className = "bg-slate-900/80 p-3 rounded-2xl border border-slate-800 space-y-2";
            div.innerHTML = `
                <div class="flex justify-between items-center text-[10px] px-1">
                    <span class="text-blue-400 font-bold uppercase">Prompt #${data.index}</span>
                    <span class="text-slate-500 font-mono">${new Date().toLocaleTimeString()}</span>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    ${data.urls.map(u => `<img src="${u}" class="rounded-xl border border-slate-700 hover:scale-105 transition-transform">`).join('')}
                </div>
            `;
            document.getElementById('results').prepend(div);
        });

        document.getElementById('btn-stop').onclick = () => { socket.emit('stop-automation'); location.reload(); };
    </script>
</body>
</html>
