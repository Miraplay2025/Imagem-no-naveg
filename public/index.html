<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controlador de Automação Pro</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #fff; margin: 20px; display: flex; gap: 20px; }
        .panel { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; flex: 1; }
        .logs { background: #000; color: #4ade80; padding: 15px; border-radius: 8px; height: 400px; overflow-y: auto; font-family: monospace; font-size: 13px; border: 1px solid #334155; }
        .preview-container { width: 400px; background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        input, textarea, button { width: 100%; margin-bottom: 15px; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box; }
        button { background: #2563eb; cursor: pointer; font-weight: bold; transition: 0.3s; border: none; }
        button:hover { background: #3b82f6; }
        button:disabled { background: #475569; cursor: not-allowed; }
        .screenshot { width: 100%; border-radius: 8px; border: 2px solid #3b82f6; margin-top: 10px; }
        #status-indicator { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: red; margin-right: 8px; }
        .img-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
        .img-grid img { width: 100%; border-radius: 4px; border: 1px solid #475569; }
    </style>
</head>
<body>

    <div class="panel">
        <h2><span id="status-indicator"></span> Automação Automática</h2>
        
        <label>Link do Projeto Google Flow:</label>
        <input type="text" id="link" placeholder="https://labs.google/fx/..." value="">

        <label>Extensão (.zip):</label>
        <input type="file" id="extensionZip" accept=".zip">

        <label>Cookies (Base64 ou JSON):</label>
        <textarea id="cookies" placeholder="Cole aqui o conteúdo dos cookies..."></textarea>

        <label>Prompts (um por linha):</label>
        <textarea id="prompts" rows="5" placeholder="Prompt 1&#10;Prompt 2..."></textarea>

        <button id="btn-start">🚀 INICIAR SERVIDOR & NAVEGADOR</button>
        <button id="btn-confirm" style="display:none; background: #16a34a;">✅ CONFIRMAR INÍCIO NA PÁGINA</button>
        <button id="btn-stop" style="background: #dc2626;">🛑 PARAR TUDO</button>

        <h3>Console de Operação</h3>
        <div id="log-window" class="logs">
            <div>Aguardando conexão com o servidor...</div>
        </div>
    </div>

    <div class="preview-container">
        <h3>Live Preview</h3>
        <div id="preview-title" style="font-size: 12px; color: #94a3b8; margin-bottom: 5px;">Nenhuma atividade...</div>
        <img id="screenshot-view" class="screenshot" src="https://via.placeholder.com/400x250?text=Sem+Sinal" alt="Preview">
        
        <h3>Imagens Capturadas</h3>
        <div id="captured-images" class="img-grid"></div>
    </div>

    <script>
        const socket = io();
        const logWindow = document.getElementById('log-window');
        const statusInd = document.getElementById('status-indicator');
        const btnStart = document.getElementById('btn-start');
        const btnConfirm = document.getElementById('btn-confirm');

        function addLog(msg) {
            const div = document.createElement('div');
            div.style.padding = "2px 0";
            div.innerHTML = `> ${msg}`;
            logWindow.appendChild(div);
            logWindow.scrollTop = logWindow.scrollHeight;
        }

        socket.on('connect', () => {
            statusInd.style.background = '#4ade80';
            addLog('<span style="color: #4ade80">SISTEMA ONLINE: Pronto para automação.</span>');
        });

        socket.on('log', (msg) => addLog(msg));

        socket.on('screenshot-update', (data) => {
            document.getElementById('screenshot-view').src = data.img;
            document.getElementById('preview-title').innerText = data.title;
        });

        socket.on('new-images', (data) => {
            addLog(`🖼️ Recebidas imagens do Prompt #${data.index}`);
            const container = document.getElementById('captured-images');
            data.urls.forEach(url => {
                const img = document.createElement('img');
                img.src = url;
                container.prepend(img);
            });
        });

        socket.on('automation-status', (data) => {
            addLog(`📢 STATUS: ${data.msg}`);
            if (data.showConfirm) {
                btnConfirm.style.display = 'block';
                btnStart.style.display = 'none';
            }
        });

        btnStart.onclick = async () => {
            const extensionFile = document.getElementById('extensionZip').files[0];
            const cookiesRaw = document.getElementById('cookies').value;
            const prompts = document.getElementById('prompts').value.split('\n').filter(p => p.trim() !== "");
            const link = document.getElementById('link').value;

            if (!extensionFile || !cookiesRaw || prompts.length === 0 || !link) {
                alert("Preencha todos os campos!");
                return;
            }

            const reader = new FileReader();
            reader.readAsDataURL(extensionFile);
            reader.onload = () => {
                const base64Zip = reader.result.split(',')[1];
                let base64Cookies = cookiesRaw;
                try {
                    JSON.parse(cookiesRaw);
                    base64Cookies = btoa(unescape(encodeURIComponent(cookiesRaw)));
                } catch(e) {}

                socket.emit('start-automation', {
                    extensionZip: base64Zip,
                    cookiesBase64: base64Cookies,
                    prompts: prompts,
                    link: link,
                    assets: []
                });
            };
        };

        btnConfirm.onclick = () => {
            socket.emit('confirm-start');
            btnConfirm.style.display = 'none';
            addLog("🚀 Injeção de comandos iniciada!");
        };

        // ALTERAÇÃO AQUI: Removido location.reload()
        document.getElementById('btn-stop').onclick = () => {
            socket.emit('stop-automation');
            addLog('<span style="color: #dc2626">🛑 Automação interrompida pelo usuário.</span>');
            
            // Reseta a visibilidade dos botões para permitir novo início sem recarregar
            btnStart.style.display = 'block';
            btnConfirm.style.display = 'none';
            
            // Limpa o preview para indicar que parou
            document.getElementById('screenshot-view').src = "https://via.placeholder.com/400x250?text=Sessão+Encerrada";
        };
    </script>
</body>
</html>
