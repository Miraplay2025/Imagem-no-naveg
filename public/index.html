<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Flow Ultra Pro</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #e2e8f0; font-family: sans-serif; }
        .mobile-field { background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; }
        .log-box { font-size: 10px; max-height: 150px; overflow-y: auto; background: #000; padding: 10px; border-radius: 8px; color: #10b981; border: 1px solid #333; }
        .screenshot-box { border: 2px solid #3b82f6; border-radius: 12px; overflow: hidden; background: #000; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">
    <div class="w-full max-w-md space-y-4">
        <h1 class="text-xl font-bold text-center text-blue-400">AUTOMATION FLOW</h1>

        <div id="robot-view" class="hidden space-y-2">
            <h2 id="view-title" class="text-xs font-bold text-blue-300 text-center uppercase">Monitor do Robô</h2>
            <div class="screenshot-box">
                <img id="screen-img" class="w-full">
            </div>
        </div>

        <input id="flow-url" type="text" placeholder="Link do Flow" class="w-full p-4 mobile-field outline-none">
        
        <label id="cookie-label" class="block w-full p-4 text-center mobile-field cursor-pointer text-sm bg-slate-800 border-dashed border-2">
            📂 Cookies (.json)
            <input type="file" id="cookies-file" class="hidden" accept=".json">
        </label>
        <div id="cookie-info" class="hidden text-center text-green-400 text-[10px]">✅ Cookies Prontos</div>

        <textarea id="prompt-input" class="w-full p-4 mobile-field h-40 outline-none" placeholder="Prompt 1...&#10;Prompt 2..."></textarea>
        
        <button id="btn-start" class="w-full p-4 bg-blue-600 rounded-xl font-bold">Iniciar Automação</button>
        <button id="btn-stop" class="hidden w-full p-4 bg-red-600 rounded-xl font-bold">Parar e Resetar</button>

        <div id="confirm-box" class="hidden p-4 bg-green-900/50 border border-green-500 rounded-xl text-center space-y-3">
            <p id="confirm-msg" class="text-sm font-bold">O robô carregou a página!</p>
            <button id="btn-confirm" class="w-full p-3 bg-green-500 text-black font-bold rounded-lg shadow-lg">Confirmar Início do Loop</button>
        </div>

        <div id="logs" class="log-box"></div>
        <div id="results" class="grid grid-cols-1 gap-4 pb-10"></div>
    </div>

    <script>
        const socket = io();
        let cookiesBase64 = null;
        const state = { prompts: [] };

        document.getElementById('cookies-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    cookiesBase64 = btoa(unescape(encodeURIComponent(event.target.result.trim())));
                    document.getElementById('cookie-info').classList.remove('hidden');
                };
                reader.readAsText(file);
            }
        });

        document.getElementById('prompt-input').addEventListener('input', (e) => {
            const rawMatches = e.target.value.split(/\bPrompt\b/i).slice(1);
            state.prompts = rawMatches.map(text => text.replace(/^[\s\d:.-]+/, "").trim()).filter(Boolean);
        });

        document.getElementById('btn-start').onclick = () => {
            addLog("Solicitando navegador...");
            socket.emit('start-automation', {
                link: document.getElementById('flow-url').value,
                prompts: state.prompts,
                cookiesBase64: cookiesBase64
            });
            document.getElementById('btn-start').classList.add('hidden');
            document.getElementById('btn-stop').classList.remove('hidden');
        };

        // Recebe e exibe prints da tela
        socket.on('screenshot-update', (data) => {
            document.getElementById('robot-view').classList.remove('hidden');
            document.getElementById('screen-img').src = data.img;
            document.getElementById('view-title').textContent = data.title;
            addLog(`Print: ${data.title}`);
        });

        socket.on('automation-status', (res) => {
            document.getElementById('confirm-box').classList.remove('hidden');
            document.getElementById('confirm-msg').textContent = res.msg;
            window.scrollTo(0, 0); // Sobe a tela para o usuário ver o print e o botão
        });

        document.getElementById('btn-confirm').onclick = () => {
            socket.emit('confirm-start');
            document.getElementById('confirm-box').classList.add('hidden');
            document.getElementById('view-title').textContent = "Automação em Curso...";
        };

        socket.on('log', (msg) => addLog(msg));

        function addLog(msg) {
            const div = document.createElement('div');
            div.textContent = `> ${msg}`;
            document.getElementById('logs').prepend(div);
        }

        socket.on('new-images', (data) => {
            const section = document.createElement('div');
            section.className = "bg-slate-900 p-2 rounded-lg border border-slate-700";
            section.innerHTML = `<h3 class="text-[10px] text-blue-400 mb-1">Prompt #${data.index}</h3><div class="grid grid-cols-2 gap-1">${data.urls.map(u => `<img src="${u}" class="rounded">`).join('')}</div>`;
            document.getElementById('results').prepend(section);
        });

        document.getElementById('btn-stop').onclick = () => { socket.emit('stop-automation'); location.reload(); };
    </script>
</body>
</html>
