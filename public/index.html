<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Flow Ultra Pro</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .mobile-field { background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; }
        .log-box { font-size: 11px; height: 180px; overflow-y: auto; background: #000; padding: 10px; border-radius: 12px; border: 1px solid #334155; }
        .log-entry { margin-bottom: 4px; border-left: 3px solid #475569; padding-left: 8px; }
        .log-error { border-color: #ef4444; color: #f87171; }
        .screenshot-box { border: 2px solid #3b82f6; border-radius: 16px; overflow: hidden; background: #000; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">
    <div class="w-full max-w-md space-y-4">
        <header class="text-center">
            <h1 class="text-2xl font-black text-blue-500 italic">AUTO FLOW PRO</h1>
        </header>

        <div id="robot-view" class="hidden space-y-2">
            <div class="screenshot-box">
                <img id="screen-img" class="w-full" src="">
            </div>
            <button id="btn-next-prompt" class="hidden w-full p-4 bg-green-600 text-white rounded-xl font-black shadow-lg">
                ✅ IMAGEM GERADA (PRÓXIMO)
            </button>
        </div>

        <div id="setup-controls" class="space-y-4">
            <input id="flow-url" type="text" placeholder="Link do Projeto Flow" class="w-full p-4 mobile-field outline-none text-sm">
            
            <label id="label-cookies" class="block p-4 text-center mobile-field border-dashed border-2 cursor-pointer text-[10px]">
                <span id="cookie-status">🔑 CARREGAR COOKIES (JSON)</span>
                <input type="file" id="cookies-file" class="hidden" accept=".json">
            </label>

            <textarea id="prompt-input" class="w-full p-4 mobile-field h-24 outline-none text-sm resize-none" placeholder="Cole os prompts aqui..."></textarea>
        </div>

        <div id="action-buttons" class="space-y-2">
            <button id="btn-start" class="w-full p-4 bg-blue-600 text-white rounded-2xl font-black">INICIAR ROBÔ</button>
            <button id="btn-stop" class="hidden w-full p-4 bg-red-600 text-white rounded-2xl font-black">PARAR OPERAÇÃO</button>
        </div>

        <div id="confirm-box" class="hidden p-4 bg-blue-900/30 border border-blue-500 rounded-xl text-center space-y-2">
            <p class="text-xs">Confirme se o site carregou corretamente no print.</p>
            <button id="btn-confirm" class="w-full p-3 bg-blue-500 text-white font-bold rounded-lg">CONFIRMAR</button>
        </div>

        <div class="log-box" id="logs"></div>
    </div>

    <script>
        const socket = io();
        let cookiesBase64 = null;

        // Feedback de Conexão
        socket.on('connect', () => addLog("🟢 Socket Conectado", "success"));

        document.getElementById('cookies-file').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                cookiesBase64 = btoa(ev.target.result);
                document.getElementById('cookie-status').innerHTML = "✅ COOKIES CARREGADOS";
                document.getElementById('label-cookies').style.borderColor = "#10b981";
            };
            reader.readAsText(e.target.files[0]);
        };

        document.getElementById('btn-start').onclick = () => {
            const prompts = document.getElementById('prompt-input').value.split('\n').filter(l => l.trim() !== "");
            socket.emit('start-automation', {
                link: document.getElementById('flow-url').value,
                prompts: prompts,
                cookiesBase64: cookiesBase64
            });
            document.getElementById('btn-start').classList.add('hidden');
            document.getElementById('btn-stop').classList.remove('hidden');
        };

        // BOTAO ENCERRAR (SEM REFRESH)
        document.getElementById('btn-stop').onclick = () => {
            socket.emit('stop-automation');
        };

        // Resposta do server ao encerrar
        socket.on('automation-stopped-confirm', () => {
            document.getElementById('btn-stop').classList.add('hidden');
            document.getElementById('btn-start').classList.remove('hidden');
            document.getElementById('robot-view').classList.add('hidden');
            document.getElementById('confirm-box').classList.add('hidden');
            document.getElementById('btn-next-prompt').classList.add('hidden');
            addLog("ℹ️ Interface resetada sem recarregar.", "info");
        });

        document.getElementById('btn-confirm').onclick = () => {
            socket.emit('confirm-start');
            document.getElementById('confirm-box').classList.add('hidden');
        };

        document.getElementById('btn-next-prompt').onclick = () => {
            socket.emit('next-prompt');
            document.getElementById('btn-next-prompt').classList.add('hidden');
        };

        socket.on('screenshot-update', (data) => {
            document.getElementById('robot-view').classList.remove('hidden');
            document.getElementById('screen-img').src = data.img;
        });

        socket.on('waiting-user-validation', () => {
            document.getElementById('btn-next-prompt').classList.remove('hidden');
        });

        socket.on('automation-status', (data) => {
            if (data.showConfirm) document.getElementById('confirm-box').classList.remove('hidden');
        });

        socket.on('log', (msg) => addLog(msg));

        function addLog(msg) {
            const div = document.createElement('div');
            div.className = "log-entry";
            if(msg.includes("❌") || msg.includes("🚫")) div.style.color = "#f87171";
            if(msg.includes("✅")) div.style.color = "#34d399";
            div.innerHTML = msg;
            const logs = document.getElementById('logs');
            logs.appendChild(div);
            logs.scrollTop = logs.scrollHeight;
        }
    </script>
</body>
</html>
